<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목공 공방 상세정보</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; background: #fff; color: #000; animation: fadeIn 0.6s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .nav { padding: 20px 5vw; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; z-index: 10; }
        .back-btn { text-decoration: none; color: #000; font-weight: 700; font-size: 1.1rem; }
        .content { max-width: 900px; margin: 0 auto; padding: 60px 20px; }
        
        .main-img { width: 100%; height: 500px; background: url('doyeah.jpeg') center/cover; margin-bottom: 40px; }
        
        .info-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .info-header h1 { font-size: 3.5rem; margin: 0; font-weight: 900; letter-spacing: -2px; }
        .status-badge { background: #000; color: #fff; padding: 10px 20px; font-weight: 800; font-size: 1.2rem; }
        .description { font-size: 1.2rem; line-height: 1.8; color: #444; margin-bottom: 50px; }
        
        .detail-list { list-style: none; padding: 0; border-top: 2px solid #000; }
        .detail-list li { padding: 20px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 1.1rem; }
        .detail-list li b { font-weight: 800; width: 120px; }
        
        /* 💡 유저용 날짜 드롭다운 스타일 */
        #date-select {
            appearance: none; -webkit-appearance: none;
            padding: 10px 35px 10px 15px; border-radius: 12px; border: 1px solid #ddd; 
            background: #f9f9f9 url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e") no-repeat right 12px center;
            background-size: 16px; font-family: inherit; font-size: 1.05rem; font-weight: 700; cursor: pointer; outline: none; transition: 0.2s;
        }
        #date-select:focus { border-color: #ff3b3b; box-shadow: 0 0 0 2px rgba(255,59,59,0.2); }

        /* 💡 관리자용 날짜 수정 인풋 스타일 */
        .admin-date-input {
            width: 120px; padding: 8px; border: 1px solid #ff3b3b; border-radius: 8px;
            font-family: inherit; font-size: 0.95rem; font-weight: 600; text-align: right;
            outline: none; transition: 0.2s;
        }
        .admin-date-input:focus { box-shadow: 0 0 0 2px rgba(255,59,59,0.2); }

        .final-btn { width: 100%; padding: 25px; background: #000; color: #fff; border: none; font-size: 1.5rem; font-weight: 900; margin-top: 60px; cursor: pointer; transition: 0.3s; }
        .final-btn:hover { background: #ff3b3b; }
        #admin-notice { background: #ff3b3b; color: #fff; padding: 15px; text-align: center; font-weight: 800; margin-bottom: 20px; display: none; }

        .editable { outline: none; transition: 0.2s; caret-color: #ff3b3b; }
        .admin-mode .editable:hover { background: rgba(255, 59, 59, 0.05); cursor: pointer; }
        .editable:focus { background: #fff; box-shadow: 0 0 0 2px #ff3b3b; padding: 2px 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="admin-notice">📢 관리자 모드: 내용 더블클릭 수정 / 날짜 옵션 3개 설정.</div>
    <nav class="nav">
        <a href="index.html" class="back-btn">← 공방 다시 선택</a>
        <div id="user-display" style="font-weight: 600;"></div>
    </nav>
    <div class="content">
        <div class="main-img"></div>
        <div class="info-header">
            <h1 id="edit-title" class="editable" data-key="doyeah">도예 클래스</h1>
            <div class="status-badge">예약 현황: 0 / 8</div>
        </div>
        <p id="edit-intro" class="description editable" data-key="doyeah_intro">
            나무의 향기와 질감을 느끼며 나만의 소품을 제작하는 시간입니다. <br>
            이번 클래스에서는 원목 도마 또는 수제 연필꽂이 중 하나를 선택하여 제작할 수 있습니다. 
        </p>
        <ul class="detail-list">
            <li style="align-items: flex-start;">
                <b style="margin-top: 10px;">일시</b> 
                
                <select id="date-select" style="display: none;"></select>
                
                <div id="admin-date-setup" style="display: none; flex-direction: column; gap: 8px;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span style="font-size: 0.85rem; color: #888; font-weight: 800;">옵션 1</span>
                        <input type="text" class="admin-date-input" id="admin_date_1">
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span style="font-size: 0.85rem; color: #888; font-weight: 800;">옵션 2</span>
                        <input type="text" class="admin-date-input" id="admin_date_2">
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span style="font-size: 0.85rem; color: #888; font-weight: 800;">옵션 3</span>
                        <input type="text" class="admin-date-input" id="admin_date_3">
                    </div>
                </div>
            </li>
            <li><b>장소</b> <span class="editable" data-key="doyeah_location">솔가람고 본관 2층 기술실</span></li>
            <li><b>준비물</b> <span class="editable" data-key="doyeah_supplies">편한 복장, 개인 텀블러</span></li>
        </ul>
        <button class="final-btn" onclick="confirmBooking()">이 공방으로 예약 확정하기 ➔</button>
    </div>

    <script>
        const DB_KEY = 'solgaramDB';
        const CURRENT_SHOP = 'doyeah'; // 💡 다른 공방에선 이걸 food나 doyeah로 변경!

        document.addEventListener('DOMContentLoaded', () => {
            const name = localStorage.getItem('visitorName');
            const isAdmin = localStorage.getItem('isAdmin') === 'true';

            if (name) document.getElementById('user-display').textContent = `${name}님`;

            const db = JSON.parse(localStorage.getItem(DB_KEY)) || { users: [], reservations: [] };
            const currentCount = db.users.filter(u => u.reservation === CURRENT_SHOP).length;
            document.querySelector('.status-badge').textContent = `예약 현황: ${currentCount} / 8`;

            // 💡 DB에서 날짜 옵션 3개 불러오기 (기본값 세팅)
            const opt1 = localStorage.getItem(`${CURRENT_SHOP}_opt_1`) || '1월 1일 14:00';
            const opt2 = localStorage.getItem(`${CURRENT_SHOP}_opt_2`) || '2월 3일 14:00';
            const opt3 = localStorage.getItem(`${CURRENT_SHOP}_opt_3`) || '3월 3일 14:00';

            if (isAdmin) {
                document.body.classList.add('admin-mode');
                document.getElementById('admin-notice').style.display = 'block';
                document.querySelector('.final-btn').textContent = "명단 확인하기 (관리자)";
                
                // 💡 관리자: 3개의 인풋창을 보여주고 값 채우기
                const adminSetup = document.getElementById('admin-date-setup');
                adminSetup.style.display = 'flex';
                
                const in1 = document.getElementById('admin_date_1');
                const in2 = document.getElementById('admin_date_2');
                const in3 = document.getElementById('admin_date_3');
                
                in1.value = opt1; in2.value = opt2; in3.value = opt3;

                // 인풋창 내용이 바뀔 때마다 로컬스토리지에 실시간 저장
                [in1, in2, in3].forEach((input, index) => {
                    input.addEventListener('input', (e) => {
                        localStorage.setItem(`${CURRENT_SHOP}_opt_${index + 1}`, e.target.value);
                    });
                });

            } else {
                // 💡 일반 유저: 드롭다운을 띄우고, 관리자가 설정한 3개의 옵션을 추가
                const select = document.getElementById('date-select');
                select.style.display = 'inline-block';
                select.innerHTML = `
                    <option value="${opt1}">${opt1}</option>
                    <option value="${opt2}">${opt2}</option>
                    <option value="${opt3}">${opt3}</option>
                `;
            }

            // 일반 텍스트 수정 기능
            document.querySelectorAll('.editable').forEach(el => {
                const savedValue = localStorage.getItem(el.dataset.key);
                if (savedValue) el.innerHTML = savedValue; 

                if (isAdmin) { 
                    el.addEventListener('dblclick', () => { el.contentEditable = "true"; el.focus(); });
                    el.addEventListener('blur', () => { el.contentEditable = "false"; localStorage.setItem(el.dataset.key, el.textContent); });
                }
            });
        });

        function confirmBooking() {
            if (localStorage.getItem('isAdmin') === 'true') {
                window.location.href = 'admin.html';
                return;
            } 
            
            const phone = localStorage.getItem('visitorPhone');
            const name = localStorage.getItem('visitorName') || '고객';

            if (!phone) {
                alert('로그인 정보가 없습니다. 처음부터 다시 진행해주세요.');
                window.location.href = 'information.html';
                return;
            }

            const db = JSON.parse(localStorage.getItem(DB_KEY));
            const cleanPhone = phone.replace(/-/g, '');
            const userIndex = db.users.findIndex(u => u.phone.replace(/-/g, '') === cleanPhone);

            if (userIndex !== -1) {
                const user = db.users[userIndex];
                
                if (user.reservation) {
                    const shopNames = { 'wood': '목공', 'food': '조리', 'doyeah': '도예' };
                    alert(`이미 [${shopNames[user.reservation]}] 클래스를 예약하셨습니다!\n1인당 1개의 공방만 예약 가능합니다.`);
                    return; 
                }

                const currentCount = db.users.filter(u => u.reservation === CURRENT_SHOP).length;
                if (currentCount >= 8) {
                    alert('죄송합니다. 해당 공방은 이미 예약 정원(8명)이 마감되었습니다. 😭');
                    return;
                }

                // 💡 유저가 드롭다운에서 선택한 날짜 가져오기
                const selectedDate = document.getElementById('date-select').value;

                if(confirm(`${name}님, 목공 클래스(${selectedDate})로 예약을 확정하시겠습니까?`)) {
                    db.users[userIndex].reservation = CURRENT_SHOP; 
                    db.users[userIndex].resDate = selectedDate; // 선택한 날짜 저장!
                    localStorage.setItem(DB_KEY, JSON.stringify(db));
                    
                    alert('예약이 성공적으로 완료되었습니다!');
                    window.location.href = 'index.html'; 
                }
            }
        }
    </script>
</body>
</html>
