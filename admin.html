<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>솔가람 관리자 - 통합 명단</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary: #ff3b3b;
            --bg-gradient: radial-gradient(at 0% 0%, hsla(0,100%,98%,1) 0, transparent 50%), 
                           radial-gradient(at 50% 100%, hsla(0,100%,95%,1) 0, transparent 50%), 
                           radial-gradient(at 100% 0%, hsla(0,0%,100%,1) 0, transparent 50%);
        }
        body, html { margin: 0; padding: 0; min-height: 100%; font-family: 'Pretendard', sans-serif; background: #ffffff var(--bg-gradient); color: #1d1d1f; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        .nav { padding: 20px 5vw; display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 10; }
        .back-btn { text-decoration: none; color: #000; font-weight: 800; font-size: 1.1rem; transition: 0.2s; }
        .back-btn:hover { color: var(--primary); }
        .admin-container { padding: 40px 5vw; display: flex; flex-direction: column; align-items: center; }
        .admin-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); padding: 40px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.05); border: 1px solid rgba(255, 255, 255, 0.6); width: 100%; max-width: 1000px; }
        
        .header-wrap { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
        .title { font-size: 2.5rem; font-weight: 900; margin: 0; letter-spacing: -1px; }
        
        /* 💡 다운로드 버튼을 위한 우측 정렬 스타일 추가 */
        .header-right { display: flex; align-items: center; gap: 15px; }
        .total-count { font-size: 1.1rem; font-weight: 700; color: #666; background: #eee; padding: 8px 15px; border-radius: 20px; transition: 0.3s; }
        .csv-btn { background: #1d1d1f; color: #fff; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .csv-btn:hover { background: var(--primary); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,59,59,0.3); }

        /* 탭 메뉴 스타일 */
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid #f1f1f1; padding-bottom: 15px; }
        .tab-btn { background: none; border: none; font-size: 1.1rem; font-weight: 700; color: #aaa; cursor: pointer; padding: 10px 24px; border-radius: 12px; transition: all 0.2s ease; }
        .tab-btn:hover { color: #666; background: rgba(0,0,0,0.03); }
        .tab-btn.active { color: var(--primary); background: rgba(255, 59, 59, 0.1); }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 18px 15px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        th { font-weight: 800; color: #888; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }
        td { font-weight: 600; font-size: 1.1rem; }
        .role-badge { padding: 5px 12px; border-radius: 12px; font-size: 0.85rem; font-weight: 800; }
        .role-admin { background: rgba(255, 59, 59, 0.1); color: var(--primary); }
        .role-user { background: #f1f1f1; color: #666; }
        .res-badge { padding: 6px 14px; border-radius: 20px; font-size: 0.9rem; font-weight: 800; display: inline-block; }
        .res-wood { background: #8D6E63; color: #fff; }
        .res-doyeah { background: #795548; color: #fff; }
        .res-food { background: #FF9800; color: #fff; }
        .res-none { background: #eee; color: #aaa; }
        tr:hover { background: rgba(255,255,255,0.5); }
        .delete-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; transition: 0.2s; opacity: 0.5; padding: 5px; }
        .delete-btn:hover { opacity: 1; transform: scale(1.3); }
    </style>
</head>
<body>

    <nav class="nav">
        <a href="index.html" class="back-btn">← 메인으로 돌아가기</a>
        <div style="font-weight: 800; color: var(--primary);">관리자 통제실</div>
    </nav>

    <div class="admin-container">
        <div class="admin-card fade-in">
            <div class="header-wrap">
                <h1 class="title">유저 명단 관리</h1>
                <div class="header-right">
                    <div class="total-count" id="total-users">총 유저 수: 0명</div>
                    <button id="csv-download-btn" class="csv-btn">📥 CSV 다운로드</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-role="all">전체 명단</button>
                <button class="tab-btn" data-role="admin">관리자</button>
                <button class="tab-btn" data-role="user">일반 유저</button>
            </div>

            <table>
                <thead id="table-head">
                    <tr>
                        <th>No.</th>
                        <th>이름</th>
                        <th>전화번호</th>
                        <th>신분</th>
                        <th>예약 공방</th>
                    </tr>
                </thead>
                <tbody id="user-list"></tbody>
            </table>
        </div>
    </div>

    <script>
        const DB_KEY = 'solgaramDB';
        let allUsers = [];
        let iAmMaster = false;
        const shopMap = { 'wood': '목공', 'doyeah': '도예', 'food': '조리' };

        // 유저 삭제 로직
        window.deleteUser = function(phoneStr, nameStr) {
            if(confirm(`정말 [${nameStr}] 유저를 강제 삭제하시겠습니까?\n(예약 내역도 함께 사라지며 복구할 수 없습니다)`)) {
                const db = JSON.parse(localStorage.getItem(DB_KEY));
                const cleanPhone = phoneStr.replace(/-/g, '');
                db.users = db.users.filter(u => u.phone.replace(/-/g, '') !== cleanPhone);
                localStorage.setItem(DB_KEY, JSON.stringify(db));
                location.reload(); 
            }
        };

        // 💡 CSV 다운로드 로직
        function downloadCSV() {
            // 현재 선택된 탭 정보 가져오기
            const activeTab = document.querySelector('.tab-btn.active').getAttribute('data-role');
            let exportUsers = allUsers;
            
            if (activeTab !== 'all') {
                exportUsers = allUsers.filter(u => u.role === activeTab);
            }

            if (exportUsers.length === 0) {
                alert("다운로드할 데이터가 없습니다.");
                return;
            }

            // 엑셀 한글 깨짐 방지 (BOM)
            let csvContent = '\uFEFF'; 
            csvContent += "No.,이름,전화번호,신분,예약 공방,예약 일시\n";

            // 데이터 변환 루프
            exportUsers.forEach((u, index) => {
                const name = u.name;
                const phone = u.phone;
                const role = u.role === 'admin' ? '관리자' : '일반인';
                const shop = u.reservation ? shopMap[u.reservation] : '미예약';
                const resDate = (u.reservation && u.resDate) ? u.resDate : '';

                // 쌍따옴표로 감싸서 안전하게 CSV 텍스트 병합
                csvContent += `"${index + 1}","${name}","${phone}","${role}","${shop}","${resDate}"\n`;
            });

            // 파일명 날짜 세팅
            const today = new Date();
            const dateStr = today.getFullYear() + String(today.getMonth() + 1).padStart(2, '0') + String(today.getDate()).padStart(2, '0');
            
            let fileName = `솔가람_전체명단_${dateStr}.csv`;
            if (activeTab === 'admin') fileName = `솔가람_관리자명단_${dateStr}.csv`;
            if (activeTab === 'user') fileName = `솔가람_일반유저명단_${dateStr}.csv`;

            // 가상의 a 태그를 만들어 다운로드 실행
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            link.setAttribute("href", url);
            link.setAttribute("download", fileName);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 테이블 렌더링 함수 (필터링 적용)
        function renderTable(roleFilter) {
            let filteredUsers = allUsers;
            
            if (roleFilter !== 'all') {
                filteredUsers = allUsers.filter(u => u.role === roleFilter);
            }

            document.getElementById('total-users').textContent = 
                roleFilter === 'all' ? `총 유저 수: ${filteredUsers.length}명` : `조회된 인원: ${filteredUsers.length}명`;

            const rowsHTML = filteredUsers.map((u, index) => {
                const isMasterRow = (u.name === "정세헌" && u.phone.replace(/-/g, '') === "01098625850");
                const displayName = isMasterRow ? `👑 ${u.name}` : u.name;
                const roleClass = u.role === 'admin' ? 'role-admin' : 'role-user';
                const roleText = u.role === 'admin' ? '관리자' : '일반인';
                const resClass = u.reservation ? `res-${u.reservation}` : 'res-none';
                
                let resText = u.reservation ? shopMap[u.reservation] : '미예약';
                if (u.reservation && u.resDate) resText += `<br><span style="font-size:0.85rem; color:#fff; opacity:0.8;">${u.resDate}</span>`;

                let deleteCell = '';
                if (iAmMaster) {
                    deleteCell = isMasterRow 
                        ? `<td></td>` 
                        : `<td><button class="delete-btn" onclick="deleteUser('${u.phone}', '${u.name}')" title="유저 삭제">❌</button></td>`;
                }

                return `
                    <tr>
                        <td style="color: #aaa; font-weight: 800;">${index + 1}</td>
                        <td style="font-weight: 800;">${displayName}</td>
                        <td>${u.phone}</td>
                        <td><span class="role-badge ${roleClass}">${roleText}</span></td>
                        <td><span class="res-badge ${resClass}">${resText}</span></td>
                        ${deleteCell}
                    </tr>
                `;
            }).join('');

            document.getElementById('user-list').innerHTML = rowsHTML;
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('isAdmin') !== 'true') {
                alert('접근 권한이 없습니다.');
                window.location.replace('index.html');
                return;
            }

            const myName = localStorage.getItem('visitorName');
            const myPhone = (localStorage.getItem('visitorPhone') || '').replace(/-/g, '');
            iAmMaster = (myName === "정세헌" && myPhone === "01098625850");

            const db = JSON.parse(localStorage.getItem(DB_KEY)) || { users: [] };
            allUsers = db.users;

            if (iAmMaster) {
                document.querySelector('#table-head tr').insertAdjacentHTML('beforeend', '<th>관리</th>');
            }

            // 다운로드 버튼 이벤트 연결
            document.getElementById('csv-download-btn').addEventListener('click', downloadCSV);

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    
                    const role = e.target.getAttribute('data-role');
                    renderTable(role);
                });
            });

            renderTable('all');
        });
    </script>
</body>
</html>
