<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약자 정보 입력</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary: #ff3b3b;
            --primary-dark: #d32f2f;
            --bg-gradient: radial-gradient(at 0% 0%, hsla(0,100%,98%,1) 0, transparent 50%), 
                           radial-gradient(at 50% 100%, hsla(0,100%,95%,1) 0, transparent 50%), 
                           radial-gradient(at 100% 0%, hsla(0,0%,100%,1) 0, transparent 50%);
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%;
            font-family: 'Pretendard', sans-serif;
            background-color: #ffffff;
            background-image: var(--bg-gradient);
            color: #1d1d1f;
            overflow: hidden; /* 스크롤 제거 */
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 1s ease-out forwards; }
        .fade-out { animation: fadeOut 0.5s ease-in-out forwards; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* 전체 화면 중앙 정렬 */
        .wrapper {
            width: 100%; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* 메인 통합 카드 */
        .main-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 80px;
            border-radius: 40px;
            box-shadow: 0 30px 100px rgba(0,0,0,0.08);
            border: 1px solid rgba(255, 255, 255, 0.4);
            text-align: center;
            max-width: 800px;
            width: 90%;
        }

        .title-main { 
            font-size: 4.5rem; 
            font-weight: 900; 
            margin: 0; 
            letter-spacing: -3px; 
            line-height: 1.1;
            background: linear-gradient(to bottom, #000, #555);

            /* 👇 이 부분을 이렇게 두 줄로 써주세요 */
            background-clip: text;              /* 표준 속성 (에디터 만족용) */
            -webkit-background-clip: text;       /* 실제 작동용 (크롬, 사파리 등) */
            
            -webkit-text-fill-color: transparent;
        }
        .title-sub { 
            font-size: 1.2rem; font-weight: 600; margin: 20px 0 60px 0; 
            color: #888; letter-spacing: 4px; text-transform: uppercase;
        }

        /* 입력 폼 영역 */
        .form-area {
            display: flex; flex-direction: column; align-items: center; gap: 40px;
        }
        .input-row { display: flex; gap: 30px; width: 100%; justify-content: center; }
        
        .input-group { display: flex; flex-direction: column; width: 240px; text-align: left; }
        .input-group label { font-size: 0.8rem; font-weight: 800; margin-bottom: 8px; color: #aaa; text-transform: uppercase; padding-left: 2px; }
        .input-group input {
            border: none; border-bottom: 2px solid #ddd;
            background: transparent; font-size: 1.5rem; font-weight: 700;
            padding: 12px 0; color: #000; outline: none;
            transition: all 0.3s;
        }
        .input-group input:focus { border-bottom: 2px solid var(--primary); }
        .input-group input::placeholder { color: #eee; }

        .submit-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff; border: none;
            padding: 22px 60px; font-size: 1.3rem; font-weight: 800;
            border-radius: 20px; cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255, 59, 59, 0.2);
            width: 100%; max-width: 510px;
            margin-top: 10px;
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255, 59, 59, 0.4); }

        /* 개인정보 팝업 */
        #privacy-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.2); backdrop-filter: blur(15px);
            z-index: 9999; display: flex; justify-content: center; align-items: center;
        }
        .hidden { display: none !important; }
        .modal-content {
            background-color: #ffffff; width: 90%; max-width: 420px;
            padding: 40px; border-radius: 30px; text-align: left;
            box-shadow: 0 40px 80px rgba(0,0,0,0.15);
        }
        .modal-content h2 { margin-top: 0; font-weight: 900; font-size: 1.6rem; letter-spacing: -1px; }
        .terms-box {
            background-color: #f8f8f9; padding: 20px; height: 140px;
            overflow-y: auto; margin: 20px 0; font-size: 0.9rem; line-height: 1.6;
            border-radius: 20px; color: #666;
        }
        .checkbox-container { margin-bottom: 30px; display: flex; align-items: center; cursor: pointer; font-weight: 700; color: #444; }
        .checkbox-container input { margin-right: 12px; width: 22px; height: 22px; accent-color: var(--primary); cursor: pointer; }
        
        #agree-btn { 
            width: 100%; padding: 20px; background-color: #1d1d1f; color: #fff; 
            border: none; border-radius: 15px; font-size: 1.1rem; font-weight: 800; cursor: pointer; 
            transition: 0.3s;
        }
        #agree-btn:disabled { background-color: #eee; color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="privacy-modal">
        <div class="modal-content fade-in">
            <h2>개인정보 동의</h2>
            <div class="terms-box">
                <p>본 시스템은 <b>솔가람고등학교</b> 공방 체험 예약을 위해 아래 정보를 수집합니다.</p>
                <p><strong>1. 수집 항목:</strong> 성명, 휴대전화번호</p>
                <p><strong>2. 이용 목적:</strong> 예약자 본인 인증 및 명단 관리</p>
                <p><strong>3. 보유 기간:</strong> 행사 종료 후 7일 보관</p>
            </div>
            <label class="checkbox-container">
                <input type="checkbox" id="agree-checkbox"> 위 내용을 확인하였습니다.
            </label>
            <button id="agree-btn" disabled>동의하고 계속하기</button>
        </div>
    </div>

    <div class="wrapper">
        <div class="main-card fade-in">
            <h1 class="title-main">솔가람<br>고등학교</h1>
            <p class="title-sub">STUDIO RESERVATION</p>

            <div class="form-area">
                <form id="infoForm">
                    <div class="input-row">
                        <div class="input-group">
                            <label for="userName">Full Name</label>
                            <input type="text" id="userName" placeholder="성함 입력" required autocomplete="off">
                        </div>
                        <div class="input-group">
                            <label for="userPhone">Mobile</label>
                            <input type="tel" id="userPhone" placeholder="010-0000-0000" required autocomplete="off">
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">예약 시작하기 ➔</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // DB 가져오기
        function getDB() {
            const db = localStorage.getItem('solgaramDB');
            return db ? JSON.parse(db) : { admins: [{name: "정세헌", phone: "01098625850"}], reservations: [] };
        }

        // DB 저장하기
        function saveDB(data) {
            localStorage.setItem('solgaramDB', JSON.stringify(data));
        }
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('privacy-modal');
            const checkbox = document.getElementById('agree-checkbox');
            const agreeBtn = document.getElementById('agree-btn');

            checkbox.onchange = (e) => agreeBtn.disabled = !e.target.checked;
            agreeBtn.onclick = () => { modal.classList.add('hidden'); };

            document.getElementById('infoForm').onsubmit = (e) => {
                e.preventDefault();
                const name = document.getElementById('userName').value;
                const phone = document.getElementById('userPhone').value;

                localStorage.setItem('visitorName', name);
                localStorage.setItem('visitorPhone', phone);

                if(name === "정세헌" && phone === "01098625850") {
                    localStorage.setItem('isAdmin', 'true');
                } else {
                    localStorage.setItem('isAdmin', 'false');
                }
                
                document.body.classList.add('fade-out');
                setTimeout(() => window.location.href = 'index.html', 500);
            };
        });
    </script>
</body>
</html>
