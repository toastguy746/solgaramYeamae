<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>솔가람 공방 선택</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary: #ff3b3b;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Pretendard', sans-serif;
            background-color: #000;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        body { animation: fadeIn 1s ease-in-out; }

        #edit-profile-btn {
            position: absolute; top: 30px; left: 30px; z-index: 25;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 10px 20px; border-radius: 50px;
            border: 1px solid var(--glass-border);
            color: #fff; text-decoration: none; font-size: 0.9rem; font-weight: 600;
            transition: all 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        #edit-profile-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        #greeting-box {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            z-index: 20; 
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 10px 30px; border-radius: 50px;
            border: 1px solid var(--glass-border);
            color: #fff; font-size: 1rem; font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: none; white-space: nowrap;
        }

        .container { display: flex; width: 100%; height: 100vh; }
        .section {
            flex: 1; position: relative;
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-decoration: none; overflow: hidden;
            transition: all 0.5s ease;
        }

        .section.wood { background-image: url('wood.jpg'); }
        .section.doyeah { background-image: url('doyeah.jpeg'); }
        .section.food { background-image: url('food.jpg'); }

        .section::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.8) 100%);
            z-index: 1; transition: opacity 0.5s;
        }

        .title-wrapper { position: relative; z-index: 2; text-align: center; transition: transform 0.5s ease; }
        .section:hover .title-wrapper { transform: translateY(-25px); }

        .title {
            font-size: 4.5vw; font-weight: 900; color: #fff;
            letter-spacing: -2px; text-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin: 0;
        }

        .booking-text {
            display: inline-block; margin-top: 20px;
            padding: 12px 35px; border-radius: 30px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff; font-weight: 700; font-size: 1.1rem;
            opacity: 0; transform: translateY(20px);
            transition: all 0.4s ease;
        }
        .section:hover .booking-text { opacity: 1; transform: translateY(0); }

        #admin-manage-btn {
            position: fixed; bottom: 30px; right: 30px; z-index: 100;
            background: var(--primary); color: #fff; border: none;
            padding: 14px 24px; font-weight: 800; border-radius: 50px;
            cursor: pointer; display: none;
            box-shadow: 0 10px 25px rgba(255, 59, 59, 0.4);
            transition: all 0.3s;
        }

        #admin-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            z-index: 1000; display: none; justify-content: center; align-items: center;
        }
        .admin-modal-content {
            background: #fff; padding: 40px; width: 350px; border-radius: 30px;
        }
        .admin-modal-content input {
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <a href="information.html" id="edit-profile-btn">
        <span>👤</span> 내 정보 수정
    </a>

    <div id="greeting-box"><span id="greeting-text">환영합니다!</span></div>

    <div class="container">
        <a href="wood.html" class="section wood">
            <div class="title-wrapper"><h2 class="title">목공</h2><div class="booking-text">예약하기</div></div>
        </a>
        <a href="doyeah.html" class="section doyeah">
            <div class="title-wrapper"><h2 class="title">도예</h2><div class="booking-text">예약하기</div></div>
        </a>
        <a href="food.html" class="section food">
            <div class="title-wrapper"><h2 class="title">조리</h2><div class="booking-text">예약하기</div></div>
        </a>
    </div>

    <button id="admin-manage-btn" onclick="toggleModal()">🛠️ 관리자 설정</button>
    <div id="admin-modal">
        <div class="admin-modal-content">
            <h3 style="color: #000;">관리자 등록</h3>
            <input type="text" id="new-name" placeholder="새 관리자 이름">
            <input type="tel" id="new-phone" placeholder="새 관리자 연락처">
            <button onclick="addAdmin()" style="width:100%; background:#000; color:#fff; padding:15px; border:none; border-radius:12px; cursor:pointer; font-weight:800; margin-top:10px;">등록하기</button>
            <button onclick="toggleModal()" style="width:100%; background:none; border:none; padding:10px; cursor:pointer; color:#000; font-weight:600; margin-top:10px;">닫기</button>
        </div>
    </div>

    <script>
        // DB 가져오기
        function getDB() {
            const db = localStorage.getItem('solgaramDB');
            return db ? JSON.parse(db) : { admins: [{name: "정세헌", phone: "01098625850"}], reservations: [] };
        }

        // DB 저장하기
        function saveDB(data) {
            localStorage.setItem('solgaramDB', JSON.stringify(data));
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            const name = localStorage.getItem('visitorName');
            const isAdmin = localStorage.getItem('isAdmin') === 'true';
            const greeting = document.getElementById('greeting-text');

            if (isAdmin) {
                greeting.textContent = "관리자님 안녕하십니까";
                document.getElementById('admin-manage-btn').style.display = 'block';
            } else if (name) {
                greeting.textContent = `${name}님, 체험을 선택해주세요.`;
            }
        });

        function toggleModal() {
            const m = document.getElementById('admin-modal');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        function addAdmin() {
            const n = document.getElementById('new-name').value;
            const p = document.getElementById('new-phone').value;
            if(!n || !p) return alert('정보를 입력해주세요.');
            let list = JSON.parse(localStorage.getItem('adminList')) || [];
            list.push({name: n, phone: p});
            localStorage.setItem('adminList', JSON.stringify(list));
            alert(`${n}님 추가 완료!`);
            toggleModal();
        }
    </script>
</body>
</html>
